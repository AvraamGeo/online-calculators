<h2>BMI Calculator</h2>
<input id="w" placeholder="Weight">
<input id="h" placeholder="Height">
<button onclick="calc()">Calc</button>
<p id="r"></p>

<script>
function calc(){
let w=document.getElementById("w").value
let h=document.getElementById("h").value/100
document.getElementById("r").innerText=w/(h*h)
}
</script>
