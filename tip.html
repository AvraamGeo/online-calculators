<!DOCTYPE html>
<html>
<head>

<title>Tip Calculator Online - Free Tool</title>

<meta name="description" content="Calculate tips easily with this free online tip calculator.">

</head>

<body>

<a href="index.html">⬅ Back to Home</a>

<h2>Tip Calculator</h2>

<input id="bill" type="number" placeholder="Bill Amount">
<input id="tip" type="number" placeholder="Tip %">

<button onclick="calc()">Calculate</button>

<p id="r"></p>

<script>
function calc(){
let bill = document.getElementById("bill").value
let tip = document.getElementById("tip").value
document.getElementById("r").innerText = (bill*(tip/100)).toFixed(2)
}
</script>

<hr>

</p>

</body>
</html>
